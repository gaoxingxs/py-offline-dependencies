name: Build Python Wheels (Production)

on:
  workflow_dispatch:
    inputs:
      requirements:
        description: "Dependencies (same format as requirements.txt)"
        required: true
      python-version:
        description: "Python version"
        default: "3.12"
      platform:
        description: "Target platform"
        default: "linux"
      arch:
        description: "Target arch (amd64 / arm64)"
        default: "amd64"
      manylinux:
        description: "manylinux image"
        default: "manylinux2014"
      only-binary:
        description: "Only use binary (true/false)"
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: ${{ inputs.python-version }}
      ARCH: ${{ inputs.arch }}
      MANYLINUX: ${{ inputs.manylinux }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare requirements.txt
        run: |
          echo "${{ inputs.requirements }}" > requirements.txt
          cat requirements.txt

      # ✅ Cache wheels（核心提速）
      - name: Cache wheels
        uses: actions/cache@v4
        with:
          path: wheels
          key: wheels-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ env.ARCH }}-${{ hashFiles('requirements.txt') }}

      # ✅ 安装 QEMU（支持 arm64）
      - name: Setup QEMU
        if: inputs.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      # ✅ 安装 Docker Buildx
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ 创建输出目录
      - name: Prepare output dir
        run: mkdir -p wheels

      # ✅ 先尝试下载已有 wheel
      - name: Download prebuilt wheels
        run: |
          pip install --upgrade pip
          pip download -r requirements.txt \
            --only-binary=:all: \
            -d wheels || true

      # ✅ 使用 manylinux 构建缺失 wheel（核心步骤）
      - name: Build wheels (manylinux)
        run: |
          IMAGE=quay.io/pypa/${{ env.MANYLINUX }}_${{ env.ARCH }}
          
          docker run --rm \
            -v $PWD:/io \
            $IMAGE \
            /bin/bash -c "
              set -e
              cd /io

              # 选择 Python 版本
              PYBIN=\$(ls /opt/python | grep cp$(echo $PYTHON_VERSION | tr -d '.') | head -n 1)
              if [ -z \"\$PYBIN\" ]; then
                echo 'Python version not found in manylinux image'
                exit 1
              fi

              /opt/python/\$PYBIN/bin/pip install -U pip wheel

              # 构建缺失 wheel（不会重复构建已有的）
              /opt/python/\$PYBIN/bin/pip wheel \
                -r requirements.txt \
                -w wheels \
                --no-cache-dir
            "

      # ✅ 修复 wheel（auditwheel，保证兼容性）
      - name: Repair wheels
        run: |
          IMAGE=quay.io/pypa/${{ env.MANYLINUX }}_${{ env.ARCH }}

          docker run --rm \
            -v $PWD:/io \
            $IMAGE \
            /bin/bash -c "
              set -e
              cd /io

              for whl in wheels/*.whl; do
                auditwheel repair \$whl -w wheels/ || true
              done
            "

      # ✅ 输出结构化目录（多版本/架构）
      - name: Organize wheels
        run: |
          TARGET_DIR=wheels/${{ env.PYTHON_VERSION }}/linux_${{ env.ARCH }}
          mkdir -p $TARGET_DIR
          mv wheels/*.whl $TARGET_DIR/ || true

      # ✅ 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ env.PYTHON_VERSION }}-${{ env.ARCH }}
          path: wheels/
